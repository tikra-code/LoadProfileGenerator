<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Humanoid Universe</title>
    <style>
        body { background-color: black; color: white; font-family: Arial, sans-serif; }
        #universe { position: relative; width: 100%; height: 100vh; overflow: hidden; }
        .star { position: absolute; border-radius: 50%; opacity: 0.8; }
        .humanoid { position: absolute; width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle, blue, transparent); }
        .ai-brain { position: absolute; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, green, transparent); }
    </style>
</head>
<body>
    <div id="universe">
        <!-- Generate stars -->
        <script>
            const universe = document.getElementById('universe');
            const starsCount = 3500;
            for (let i = 0; i < starsCount; i++) {
                let star = document.createElement('div');
                star.classList.add('star');
                let size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.backgroundColor = 'white';
                star.style.top = `${Math.random() * 100}vh`;
                star.style.left = `${Math.random() * 100}vw`;
                universe.appendChild(star);
            }

            // Create humanoid avatar
            let humanoid = document.createElement('div');
            humanoid.classList.add('humanoid');
            humanoid.style.top = '50%';
            humanoid.style.left = '50%';
            universe.appendChild(humanoid);

            // Animate humanoid
            setInterval(() => {
                humanoid.style.top = `${Math.random() * 100}vh`;
                humanoid.style.left = `${Math.random() * 100}vw`;
            }, 1000);

            // Create AI brain behavior
            let aiBrain = document.createElement('div');
            aiBrain.classList.add('ai-brain');
            aiBrain.style.top = '25%';
            aiBrain.style.left = '25%';
            universe.appendChild(aiBrain);

            // Animate AI brain
            setInterval(() => {
                aiBrain.style.top = `${Math.random() * 100}vh`;
                aiBrain.style.left = `${Math.random() * 100}vw`;
            }, 1500);
        </script>
    </div>
</body>
</html>
